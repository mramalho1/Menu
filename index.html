<meta charset="utf-8">
<script>
    let menu = 0;
    let cadastro = [];
    let continuar = "s"
    while(menu != 4){
        menu = Number(prompt("Selecione a opção desejada: \n1 - Cadastrar alunos e suas notas \n2 - Imprimir lista de aluno \n3 - Imprimir dados de Aluno específico \n4 - Sair do menu"));

        if(menu == 1){
            continuar = "s";
            while(continuar === "s"){
                let nome = prompt("Digite o nome do aluno:");
                let nmat = Number(prompt("Digite a nota de matemática"));
                let npt = Number(prompt("Digite a nota de português:"));
                let nci = Number(prompt("Digite a nota de ciências:"));
                cadastro.push({nome, nmat, npt, nci})
                continuar = prompt("Deseja cadastrar outro aluno?[s/n]");

            }

        }else if(menu == 2){
            for(let i = 0 ; i < cadastro.length ; i++){
                alert("Nome: " + cadastro[i].nome + "\n" +
                    "Nota de matemática: " + cadastro[i].nmat + "\n" +
                    "Nota de português: " + cadastro[i].npt + "\n" +
                    "Nota de ciências: " + cadastro[i].nci + "\n\n"
        );
            }
        }else if(menu == 3){
            let aluno = prompt("Digite o nome do aluno que você deseha visualizar as notas");
            for(let i = 0 ; i < cadastro.length ; i++){
                if(cadastro[i].nome == aluno){
                    alert("Nome: " + cadastro[i].nome + "\n" +
                    "Nota de matemática: " + cadastro[i].nmat + "\n" +
                    "Nota de português: " + cadastro[i].npt + "\n" +
                    "Nota de ciências: " + cadastro[i].nci + "\n\n");
                }
            }
        }
    }
    alert("Obrigado por usar o programa! 👍😊");
</script>
